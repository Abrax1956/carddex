<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CardDex</title>

<style>
/* KEEP YOUR UI EXACTLY */
body{margin:0;background:#050b16;color:white;font-family:Inter,system-ui}
.app{max-width:600px;margin:auto;padding:16px 16px 90px}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* FEATURED */
.featured{
  border-radius:20px;
  padding:20px;
  background:linear-gradient(135deg,#ff7a18,#ffb347,#8a2be2);
  margin-bottom:16px;
}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.card{
  border-radius:16px;
  padding:12px;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

button{margin-top:5px}

/* NAV */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#081426;
  display:flex;justify-content:space-around;padding:10px
}
.nav div{cursor:pointer;color:#9aa4b2;text-align:center}

/* FAB */
.fab{
  position:fixed;bottom:35px;left:50%;
  transform:translateX(-50%);
  width:64px;height:64px;border-radius:50%;
  background:#4ee1a3;color:black;
  display:flex;align-items:center;justify-content:center;
  font-size:28px
}

/* SELECTOR */
.selector{
  position:fixed;bottom:0;left:0;right:0;
  background:#081426;padding:16px;
  display:none;max-height:70%;overflow:auto;
  transition:.3s
}

/* TOAST */
.toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%);
  background:#0b1220;padding:10px 20px;
  border-radius:10px
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="homePage" class="page active">
  <div class="featured">
    <h2 id="featuredName">—</h2>
    <div id="featuredValue">€0</div>
  </div>
  <div id="homeGrid" class="grid"></div>
</div>

<!-- COLLECTION -->
<div id="collectionPage" class="page">
  <h3>Your Collection</h3>
  <div id="collectionGrid" class="grid"></div>
</div>

<!-- SEARCH -->
<div id="searchPage" class="page">
  <input placeholder="Search..." oninput="searchCards(this.value)">
  <div id="searchResults"></div>
</div>

</div>

<div class="fab" onclick="openSelector()">+</div>

<div class="nav">
  <div onclick="goPage('home')">🏠<br>Home</div>
  <div onclick="goPage('collection')">📦<br>Collection</div>
  <div onclick="goPage('search')">🔍<br>Search</div>
</div>

<div id="selector" class="selector">
  <input placeholder="Search..." oninput="searchCards(this.value)">
  <div id="cardList"></div>
</div>

<script>
const KEY="carddex";
let collection=[];

/* STORAGE */
function save(){localStorage.setItem(KEY,JSON.stringify(collection))}
function load(){const d=localStorage.getItem(KEY);if(d)collection=JSON.parse(d)}

/* 50+ CARDS */
const db = Array.from({length:50},(_,i)=>({
  name:"Pokemon "+(i+1),
  rarity:["🔥","⭐","⚡","🌙"][i%4],
  value:Math.floor(Math.random()*500)+50,
  img:`https://images.pokemontcg.io/base${(i%10)+1}/${i+1}.png`
}));

/* NAVIGATION */
function goPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p+"Page").classList.add("active");
}

/* ADD */
function addCard(c){
  const existing=collection.find(x=>x.name===c.name);
  if(existing){existing.qty++;}
  else collection.push({...c,qty:1});

  save();
  render();
  toast("Added "+c.name);
}

/* REMOVE */
function removeCard(i){
  if(!confirm("Remove this card?")) return;
  collection.splice(i,1);
  save();render();
  toast("Card removed");
}

/* DECREASE */
function decrease(i){
  collection[i].qty--;
  if(collection[i].qty<=0) collection.splice(i,1);
  save();render();
}

/* RENDER */
function render(){

  // HOME
  const home=document.getElementById("homeGrid");
  home.innerHTML="";

  if(collection.length){
    const top=[...collection].sort((a,b)=>b.value-a.value)[0];
    document.getElementById("featuredName").innerText=top.name;
    document.getElementById("featuredValue").innerText="€"+top.value;
  }

  collection.forEach(c=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <div>${c.name}</div>
      <div>€${c.value}</div>
    `;
    home.appendChild(el);
  });

  // COLLECTION
  const col=document.getElementById("collectionGrid");
  col.innerHTML="";

  if(!collection.length){
    col.innerHTML="No cards yet";
  }

  collection.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <img src="${c.img}" width="50"><br>
      ${c.name}<br>
      €${c.value} x${c.qty}<br>
      <button onclick="decrease(${i})">-</button>
      <button onclick="addCard(db.find(x=>x.name==='${c.name}'))">+</button>
      <button onclick="removeCard(${i})">Delete</button>
    `;
    col.appendChild(el);
  });
}

/* SEARCH */
function searchCards(q){
  const results=db.filter(c=>c.name.toLowerCase().includes(q.toLowerCase()));
  const wrap=document.getElementById("searchResults");
  wrap.innerHTML="";

  results.forEach(c=>{
    const el=document.createElement("div");
    el.innerHTML=`
      <img src="${c.img}" width="50">
      ${c.name} €${c.value}
      <button onclick='addCard(${JSON.stringify(c)})'>Add</button>
    `;
    wrap.appendChild(el);
  });
}

/* SELECTOR */
function openSelector(){
  document.getElementById("selector").style.display="block";
}

/* TOAST */
function toast(msg){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

/* INIT */
load();
render();
</script>

</body>
</html>
