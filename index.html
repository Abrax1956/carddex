<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CardDex</title>

<style>
:root{
  --bg:#050b16;
  --accent:#4ee1a3;
  --muted:#9aa4b2;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#0a1a30,#050b16);
  color:white;
  font-family:Inter,system-ui;
}

.app{
  max-width:600px;
  margin:auto;
  padding:16px 16px 120px;
}

.page{display:none;opacity:0;transition:.25s}
.page.active{display:block;opacity:1}

/* FEATURED */
.featured{
  border-radius:20px;
  padding:22px;
  background:linear-gradient(135deg,#ff7a18,#ffb347,#8a2be2);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  margin-bottom:18px;
}
.featured .value{font-size:36px;font-weight:800;margin-top:10px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* CARD */
.card{
  border-radius:18px;
  padding:14px;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}
.card img{
  width:100%;
  border-radius:12px;
  margin-bottom:8px;
}

button{
  border:none;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

.buy{
  background:linear-gradient(90deg,#4ee1a3,#22c1a4);
  color:#042022;
}
.sell{
  background:linear-gradient(90deg,#ff6b6b,#ff3b3b);
  color:white;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#081426;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  z-index:10;
}

/* FAB FIXED */
.fab{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  width:64px;height:64px;
  border-radius:50%;
  background:linear-gradient(135deg,#4ee1a3,#22c1a4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#042022;
  z-index:11;
}

/* SEARCH */
.search input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

/* LOADING */
.loading{text-align:center;color:var(--muted);padding:10px}

/* SELECTOR */
.selector{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
}
.selector-content{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:#081426;
  padding:16px;
  max-height:70%;
  overflow:auto;
  border-radius:20px 20px 0 0;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  background:#0b1220;
  padding:10px 20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="homePage" class="page active">
  <div class="featured">
    <div id="featuredName">—</div>
    <div class="value" id="featuredValue">€0</div>
  </div>
  <div id="homeGrid" class="grid"></div>
</div>

<!-- COLLECTION -->
<div id="collectionPage" class="page">
  <div id="collectionGrid" class="grid"></div>
</div>

<!-- SEARCH -->
<div id="searchPage" class="page search">
  <input placeholder="Search Pokémon cards..." oninput="handleSearch(this.value)">
  <div id="searchResults"></div>
  <div id="loadMoreWrap"></div>
</div>

</div>

<div class="fab" onclick="openSelector()">+</div>

<div class="nav">
  <div onclick="goPage('home')">🏠<br>Home</div>
  <div onclick="goPage('collection')">📦<br>Collection</div>
  <div onclick="goPage('search')">🔍<br>Search</div>
</div>

<!-- SELECTOR -->
<div id="selector" class="selector" onclick="closeSelector(event)">
  <div class="selector-content" onclick="event.stopPropagation()">
    <input placeholder="Search..." oninput="handleSearch(this.value)">
    <div id="cardList"></div>
  </div>
</div>

<script>
const KEY="carddex";
let collection=[];

/* SEARCH STATE */
let currentPage=1;
let currentQuery="";
let loading=false;

/* STORAGE */
function save(){localStorage.setItem(KEY,JSON.stringify(collection))}
function load(){const d=localStorage.getItem(KEY);if(d)collection=JSON.parse(d)}

/* NAV */
function goPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p+"Page").classList.add("active");
}

/* ADD */
function addCard(c){
  const ex=collection.find(x=>x.id===c.id);
  if(ex) ex.qty++;
  else collection.push({...c,qty:1});
  save();render();
  toast("Added "+c.name);
}

/* REMOVE */
function removeCard(i){
  if(!confirm("Remove this card?")) return;
  collection.splice(i,1);
  save();render();
}

/* DECREASE */
function decrease(i){
  collection[i].qty--;
  if(collection[i].qty<=0) collection.splice(i,1);
  save();render();
}

/* PRICE */
function getPrice(c){
  if(c.tcgplayer?.prices){
    const p=Object.values(c.tcgplayer.prices)[0];
    if(p?.market) return Math.round(p.market);
  }
  return Math.floor(Math.random()*100)+20;
}

/* RENDER */
function render(){
  const home=document.getElementById("homeGrid");
  home.innerHTML="";

  if(collection.length){
    const top=[...collection].sort((a,b)=>b.value-a.value)[0];
    featuredName.innerText=top.name;
    featuredValue.innerText="€"+top.value;
  }

  collection.forEach(c=>{
    home.innerHTML+=`
      <div class="card">
        <img src="${c.img}">
        ${c.name}<br>€${c.value}
      </div>`;
  });

  const col=document.getElementById("collectionGrid");
  col.innerHTML="";

  collection.forEach((c,i)=>{
    col.innerHTML+=`
      <div class="card">
        <img src="${c.img}">
        ${c.name}<br>€${c.value} x${c.qty}<br>
        <button class="buy" onclick="addCard(collection[${i}])">+</button>
        <button onclick="decrease(${i})">-</button>
        <button class="sell" onclick="removeCard(${i})">Delete</button>
      </div>`;
  });
}

/* ================= SEARCH API ================= */

let debounceTimer;

function handleSearch(q){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{
    currentQuery=q;
    currentPage=1;
    fetchCards(true);
  },400);
}

async function fetchCards(reset=false){
  if(!currentQuery) return;
  if(loading) return;

  loading=true;

  const wrap=document.getElementById("searchResults");
  if(reset) wrap.innerHTML="<div class='loading'>Loading...</div>";

  try{
    const res=await fetch(`https://api.pokemontcg.io/v2/cards?q=name:${currentQuery}&pageSize=50&page=${currentPage}`);
    const data=await res.json();

    if(reset) wrap.innerHTML="";

    data.data.forEach(c=>{
      const price=getPrice(c);
      const el=document.createElement("div");
      el.className="card";
      el.innerHTML=`
        <img src="${c.images.small}">
        ${c.name}<br>${c.set.name}<br>${c.rarity||""}<br>€${price}
        <button class="buy">Add</button>
      `;
      el.querySelector("button").onclick=()=>addCard({
        id:c.id,
        name:c.name,
        img:c.images.small,
        value:price
      });
      wrap.appendChild(el);
    });

    renderLoadMore();

  }catch(e){
    wrap.innerHTML="<div class='loading'>Error loading cards</div>";
  }

  loading=false;
}

/* PAGINATION */
function renderLoadMore(){
  const wrap=document.getElementById("loadMoreWrap");
  wrap.innerHTML=`
    <button onclick="loadMore()">Load more</button>
  `;
}

function loadMore(){
  currentPage++;
  fetchCards();
}

/* SELECTOR */
function openSelector(){
  document.getElementById("selector").style.display="block";
}
function closeSelector(e){
  if(e.target.id==="selector"){
    document.getElementById("selector").style.display="none";
  }
}

/* TOAST */
function toast(msg){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

/* INIT */
load();
render();
</script>

</body>
</html>
