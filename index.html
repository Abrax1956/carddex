<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CardDex</title>

<style>
:root{
  --bg:#050b16;
  --card:#0b1220;
  --accent:#4ee1a3;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#0a1a30,#050b16);
  font-family:Inter,system-ui;
  color:white;
}

.app{
  max-width:600px;
  margin:auto;
  padding:16px 16px 90px;
}

/* FEATURED CARD */
.featured{
  border-radius:20px;
  padding:20px;
  background:linear-gradient(135deg,#ff7a18,#ffb347,#8a2be2);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  margin-bottom:16px;
}
.featured h2{margin:0;font-size:22px}
.featured .value{font-size:32px;font-weight:800;margin-top:8px}

/* BREAKDOWN */
.breakdown{
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:16px;
  margin-bottom:16px;
}
.bar{
  height:8px;
  border-radius:10px;
  background:linear-gradient(90deg,#4ee1a3,#8a2be2,#ff7a18);
  margin-top:8px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* CARD */
.card{
  border-radius:16px;
  padding:12px;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition:.25s;
}
.card:hover{transform:scale(1.03)}

.card .name{font-weight:700}
.card .price{font-size:18px;font-weight:700}

/* ICON */
.icon{font-size:18px}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#081426;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid rgba(255,255,255,0.05);
}
.nav div{text-align:center;font-size:12px;color:#9aa4b2}

/* FAB */
.fab{
  position:fixed;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  width:64px;height:64px;
  border-radius:50%;
  background:linear-gradient(135deg,#4ee1a3,#22c1a4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#042022;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* SELECTOR */
.selector{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#081426;
  padding:16px;
  display:none;
  max-height:70%;
  overflow:auto;
}
.selector-item{
  display:flex;
  gap:10px;
  padding:8px;
}
</style>
</head>

<body>

<div class="app">

<!-- FEATURED -->
<div class="featured" id="featured">
  <h2>🔥 Featured Card</h2>
  <div id="featuredName">—</div>
  <div class="value" id="featuredValue">€0</div>
</div>

<!-- BREAKDOWN -->
<div class="breakdown">
  <div>Collection Breakdown</div>
  <div class="bar"></div>
  <div id="breakdownText"></div>
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

</div>

<!-- FAB -->
<div class="fab" onclick="openSelector()">+</div>

<!-- NAV -->
<div class="nav">
  <div>🏠<br>Home</div>
  <div>📦<br>Collection</div>
  <div>🔍<br>Search</div>
</div>

<!-- SELECTOR -->
<div id="selector" class="selector">
  <input placeholder="Search..." oninput="filterCards(this.value)">
  <div id="cardList"></div>
</div>

<script>
/* === SAME LOGIC === */
const KEY="carddex";
let collection=[];

function save(){localStorage.setItem(KEY,JSON.stringify(collection))}
function load(){const d=localStorage.getItem(KEY);if(d)collection=JSON.parse(d)}

const db=[
{ name:"Charizard GX", rarity:"🔥", value:950, img:"https://images.pokemontcg.io/sm115/SM115.png"},
{ name:"Pikachu VMAX", rarity:"⚡", value:420, img:"https://images.pokemontcg.io/swsh4/188.png"},
{ name:"Umbreon VMAX", rarity:"🌙", value:780, img:"https://images.pokemontcg.io/swsh7/215.png"},
{ name:"Rayquaza EX", rarity:"⭐", value:350, img:"https://images.pokemontcg.io/ex7/97.png"},
{ name:"Mewtwo GX", rarity:"🧠", value:210, img:"https://images.pokemontcg.io/sm35/39.png"}
];

function addCard(c){
  collection.push({...c,qty:1,current:c.value});
  save();render();
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  if(!collection.length){
    grid.innerHTML="<div>Tap + to start</div>";
    return;
  }

  // FEATURED
  const top=[...collection].sort((a,b)=>b.current-a.current)[0];
  document.getElementById("featuredName").innerText=top.name;
  document.getElementById("featuredValue").innerText="€"+top.current;

  // BREAKDOWN
  document.getElementById("breakdownText").innerText=
    collection.length+" cards";

  collection.forEach((c,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <div class="icon">${c.rarity}</div>
      <div class="name">${c.name}</div>
      <div class="price">€${c.current}</div>
    `;

    grid.appendChild(el);
  });
}

/* SELECTOR */
function openSelector(){
  document.getElementById("selector").style.display="block";
  renderSelector(db);
}
function filterCards(q){
  renderSelector(db.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())));
}
function renderSelector(list){
  const wrap=document.getElementById("cardList");
  wrap.innerHTML="";
  list.forEach(c=>{
    const el=document.createElement("div");
    el.className="selector-item";
    el.innerHTML=`<img src="${c.img}" width="40"><div>${c.name}</div>`;
    el.onclick=()=>{
      addCard(c);
      document.getElementById("selector").style.display="none";
    };
    wrap.appendChild(el);
  });
}

load();
render();
</script>

</body>
</html>
